services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: civicpulse
      POSTGRES_USER: civicpulse
      POSTGRES_PASSWORD: civicpulse
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

volumes:
  postgres-data:
